<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <!-- Google Fonts Integration for Baloo 2 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Updated to Baloo 2 */
            font-family: 'Baloo 2', sans-serif; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            max-width: 90%;
            width: 450px;
        }

        h1 {
            font-size: 2.8rem; /* Bumped up slightly because Baloo looks great larger */
            font-weight: 800;  /* Thick, playful weight for the main title */
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 1.3rem; /* Made the subtext slightly bigger and thicker to match */
            opacity: 0.95;
            font-weight: 600;  /* Clean, highly readable weight for Baloo subtext */
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>www.mondn8.de</h1>
        <p>Coming Soon</p>
    </div>

</body>
</html>
